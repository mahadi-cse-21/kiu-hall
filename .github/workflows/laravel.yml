name: Deploy to  Production1

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, json, openssl, pdo_mysql, tokenizer, xml, zip

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Prepare Deployment
        run: |
          # Clean previous temp directory
          rm -rf deploy_temp
          
          # Create temporary deployment directory
          mkdir -p deploy_temp
          
          # Copy files excluding unnecessary items
          rsync -av \
            --exclude='deploy_temp' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='storage/logs/*' \
            --exclude='.env' \
            --exclude='.env.*' \
            ./ deploy_temp/
          
          cd deploy_temp
          
          # Remove unnecessary files
          rm -rf .git .github node_modules tests 2>/dev/null || true
          rm -rf storage/logs/* 2>/dev/null || true
          rm -f .env .env.* 2>/dev/null || true
          
          # Create necessary directories
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p bootstrap/cache
          
          # Create .gitkeep files to preserve directories
          touch storage/framework/cache/.gitkeep
          touch storage/framework/sessions/.gitkeep
          touch storage/framework/views/.gitkeep
          touch bootstrap/cache/.gitkeep
          
          echo "Deployment package ready"
          ls -la
          
      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./deploy_temp/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          protocol: ftp
          port: 21
          passive: true
          log-level: verbose