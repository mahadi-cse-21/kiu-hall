name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        
    - name: Install Dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
      
    - name: Prepare Deployment
      run: |
        mkdir -p deploy_temp
        cp -r . deploy_temp/
        cd deploy_temp
        rm -rf .git .github node_modules tests storage/logs/* .env .env.*
        mkdir -p storage/framework/{cache,sessions,views}
        mkdir -p bootstrap/cache
        
    - name: FTP Deploy (Try different protocols)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./deploy_temp/
        server-dir: ${{ secrets.FTP_REMOTE_DIR }}  # Use full path from root
        protocol: ftp  # Try 'ftp' instead of 'ftps' first
        port: 21
        # Remove or comment out dangerous-clean-slate initially
        # dangerous-clean-slate: false