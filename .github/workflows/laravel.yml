name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'
        extensions: mbstring, bctype, xml, ctype, json, tokenizer, mysqli, pdo_mysql
        
    - name: Install Dependencies
      run: |
        composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
        
    - name: Prepare Deployment Files
      run: |
        # Create deployment package
        mkdir deploy_temp
        cp -r . deploy_temp/
        cd deploy_temp
        
        # Remove unnecessary files
        rm -rf .git .github tests node_modules storage/logs/* storage/framework/cache/* storage/framework/sessions/* storage/framework/views/* bootstrap/cache/*.php
        
        # Create directories with proper structure
        mkdir -p storage/framework/cache
        mkdir -p storage/framework/sessions
        mkdir -p storage/framework/views
        mkdir -p bootstrap/cache
        
        # Set permissions (will be handled on server)
        chmod -R 775 storage bootstrap/cache
        
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./deploy_temp/
        server-dir: /hall.librarymh.xyz/  # Change this to your server path
        protocol: ftp  # or ftps for secure FTP
        port: 21  # or 22 for SFTP
        dangerous-clean-slate: false  # Set to true to delete all files on server before deploy (CAUTION!)