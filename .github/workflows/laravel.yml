name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'  # Updated to match server
        extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, json, openssl, pdo_mysql, tokenizer, xml, zip
        
    - name: Install Dependencies
      run: |
        composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
        
    - name: Prepare Deployment Package
      run: |
        # Create deployment package without dev dependencies
        mkdir deploy_temp
        rsync -av --exclude='.git' \
                   --exclude='.github' \
                   --exclude='node_modules' \
                   --exclude='tests' \
                   --exclude='storage/logs/*' \
                   --exclude='.env' \
                   --exclude='deploy_temp' \
                   ./ deploy_temp/
        
    - name: FTP Deploy
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./deploy_temp/
        server-dir: /hall.librarymh.xyz/  # Your domain directory
        protocol: ftps  # Use FTPS for security if available
        port: 21
        exclude: |
          .git/**
          .github/**
          node_modules/**
          tests/**
          .env
          .env.*
          deploy_temp/**
          
    - name: Cleanup
      run: rm -rf deploy_temp