name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, json, openssl, pdo_mysql, tokenizer, xml, zip

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      - name: Setup SSH Key
        run: |
          # Create SSH directory
          mkdir -p ~/.ssh
          
          # Write the private key (ensure proper formatting)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # Add server to known hosts
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          
          # Test SSH connection
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} "echo 'SSH connection successful'"
          
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to website directory
            cd /home/${{ secrets.SSH_USERNAME }}/public_html/hall.librarymh.xyz
            
            # Pull latest changes (if using git)
            git pull origin main || true
            
            # Install composer dependencies
            /usr/bin/alt-php83 /usr/local/bin/composer install --no-dev --optimize-autoloader
            
            # Run migrations
            /usr/bin/alt-php83 artisan migrate:fresh --seed --force
            
            # Clear and cache configuration
            /usr/bin/alt-php83 artisan config:clear
            /usr/bin/alt-php83 artisan config:cache
            /usr/bin/alt-php83 artisan route:cache
            /usr/bin/alt-php83 artisan view:cache
            
            # Set permissions
            chmod -R 755 storage bootstrap/cache
            chown -R ${{ secrets.SSH_USERNAME }}:${{ secrets.SSH_USERNAME }} storage bootstrap/cache
            
            echo "Deployment completed successfully"